<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#F5E8E4" rx="8"/>

  <!-- Decorative gradient overlay -->
  <rect width="400" height="300" fill="url(#bgGradient)" rx="8" opacity="0.5"/>

  <!-- Center logo container -->
  <circle cx="200" cy="130" r="70" fill="#FDF8F3" stroke="#D4825F" stroke-width="2"/>

  <!-- Abby Logo embedded via foreignObject for compatibility -->
  <foreignObject x="145" y="75" width="110" height="110">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
      <img src="/Abby/Abby Logo.svg" alt="Abby" style="width:100%;height:100%;object-fit:contain;"/>
    </div>
  </foreignObject>

  <!-- Text -->
  <text x="200" y="230" text-anchor="middle" font-family="serif" font-size="16" fill="#8B3A1F" font-weight="500">
    Abby Hair Studio
  </text>
  <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B85C38" letter-spacing="2">
    PREMIUM HAIR CARE
  </text>

  <!-- Definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="400" y2="300">
      <stop offset="0%" stop-color="#F5E8E4"/>
      <stop offset="50%" stop-color="#E8C4B8"/>
      <stop offset="100%" stop-color="#F5E8E4"/>
    </linearGradient>
  </defs>
</svg>
